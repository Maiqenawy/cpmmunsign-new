<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="three.min.js"></script>
<script src="GLTFLoader.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#0D1B2A; }
canvas { display:block; width:100% !important; height:100% !important; }

#overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:#0D1B2A; z-index:10;
    transition:opacity 0.65s ease;
}
.figure { position:relative; width:110px; height:180px; }
.head { position:absolute; top:0; left:50%; transform:translateX(-50%); width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#4ecdc4,#2a9d8f); box-shadow:0 0 18px rgba(78,205,196,.4); animation:headBob 2.4s ease-in-out infinite; }
.body { position:absolute; top:50px; left:50%; transform:translateX(-50%); width:6px; height:56px; background:linear-gradient(to bottom,#4ecdc4,#264653); border-radius:3px; }
.arm-left  { position:absolute; top:54px; left:18px;  width:6px; height:44px; background:#4ecdc4; border-radius:3px; transform-origin:top center; animation:armLeftRelax 2.4s ease-in-out infinite; }
.arm-right { position:absolute; top:54px; right:18px; width:6px; height:36px; background:#4ecdc4; border-radius:3px; transform-origin:top center; animation:armRightThink 2.4s ease-in-out infinite; }
.forearm-right { position:absolute; top:82px; right:10px; width:6px; height:28px; background:#2a9d8f; border-radius:3px; transform-origin:top center; animation:forearmThink 2.4s ease-in-out infinite; }
.leg { position:absolute; top:106px; width:6px; height:50px; background:linear-gradient(to bottom,#264653,#1a3344); border-radius:3px; animation:legSway 2.4s ease-in-out infinite; }
.leg-left{left:40px;} .leg-right{right:40px; animation-delay:.3s;}
.dots { display:flex; gap:6px; margin-top:24px; }
.dot { width:8px; height:8px; border-radius:50%; background:#4ecdc4; animation:dotPulse 1.4s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.2s;} .dot:nth-child(3){animation-delay:.4s;}
.label { margin-top:14px; color:rgba(78,205,196,.7); font-family:sans-serif; font-size:12px; letter-spacing:.5px; }

@keyframes headBob     {0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-4px)}}
@keyframes armLeftRelax{0%,100%{transform:rotate(8deg)} 50%{transform:rotate(-4deg)}}
@keyframes armRightThink{0%,100%{transform:rotate(-50deg)} 50%{transform:rotate(-58deg)}}
@keyframes forearmThink{0%,100%{transform:rotate(80deg)} 50%{transform:rotate(88deg)}}
@keyframes legSway     {0%,100%{transform:rotate(2deg)} 50%{transform:rotate(-2deg)}}
@keyframes dotPulse    {0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<div id="overlay">
  <div class="figure">
    <div class="head"></div><div class="body"></div>
    <div class="arm-left"></div><div class="arm-right"></div>
    <div class="forearm-right"></div>
    <div class="leg leg-left"></div><div class="leg leg-right"></div>
  </div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="label" id="statusLabel">Preparing avatar...</div>
</div>

<script>
if (typeof THREE === 'undefined') {
    document.getElementById('statusLabel').textContent = '3D engine missing';
    console.error('THREE not loaded');
}

// ── flutter_inappwebview bridge ───────────────────────────────────────────────
var _q = [], _br = false;
window.addEventListener('flutterInAppWebViewPlatformReady', function(){
    _br = true;
    _q.forEach(function(m){ window.flutter_inappwebview.callHandler('FlutterBridge', m); });
    _q = [];
});
function notify(msg){
    if(_br && window.flutter_inappwebview) window.flutter_inappwebview.callHandler('FlutterBridge', msg);
    else _q.push(msg);
}

// ── Renderer / Scene / Camera ─────────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x0D1B2A);

var camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 2.8);
camera.lookAt(0, 0.8, 0);

scene.add(new THREE.AmbientLight(0xffffff, 2.0));
var kl=new THREE.DirectionalLight(0xfff5e0,1.4); kl.position.set(.5,2,2); scene.add(kl);
var fl=new THREE.DirectionalLight(0x80b4ff,0.8); fl.position.set(-2,1,0); scene.add(fl);
var rl=new THREE.DirectionalLight(0xffffff,0.5); rl.position.set(0,1,-2); scene.add(rl);

// ── State ─────────────────────────────────────────────────────────────────────
var boneMap = {}, boneState = {}, B = {};
var currentMode = 'thinking';
var idleTime = 0, idleRafId = null;
var modelLoaded = false;

// ── Bone name auto-detection ──────────────────────────────────────────────────
function _resolveBones(){
    function find(){
        for(var i=0;i<arguments.length;i++){
            var n=arguments[i];
            if(boneMap[n]) return n;
            if(boneMap['mixamorig'+n]) return 'mixamorig'+n;
            if(boneMap[n.toLowerCase()]) return n.toLowerCase();
        }
        return null;
    }
    B.lSh   = find('LeftShoulder',  'left_shoulder');
    B.rSh   = find('RightShoulder', 'right_shoulder');
    B.lArm  = find('LeftArm',       'Left_Arm',   'arm_l',  'upperarm_l');
    B.lFore = find('LeftForeArm',   'Left_ForeArm','forearm_l','lowerarm_l');
    B.lHand = find('LeftHand',      'Left_Hand',  'hand_l');
    B.rArm  = find('RightArm',      'Right_Arm',  'arm_r',  'upperarm_r');
    B.rFore = find('RightForeArm',  'Right_ForeArm','forearm_r','lowerarm_r');
    B.rHand = find('RightHand',     'Right_Hand', 'hand_r');
    var lp='LeftHand', rp='RightHand';
    B.lF={}; B.rF={};
    ['Thumb','Index','Middle','Ring','Pinky'].forEach(function(f){
        B.lF[f]=[find(lp+f+'1'),find(lp+f+'2'),find(lp+f+'3')];
        B.rF[f]=[find(rp+f+'1'),find(rp+f+'2'),find(rp+f+'3')];
    });
    console.log('=== Avatar Bone Map ===');
    console.log('L Arm:'+B.lArm+'  L Fore:'+B.lFore+'  L Hand:'+B.lHand);
    console.log('R Arm:'+B.rArm+'  R Fore:'+B.rFore+'  R Hand:'+B.rHand);
    console.log('L Index:'+(B.lF.Index||[]).join(','));
    console.log('R Index:'+(B.rF.Index||[]).join(','));
    console.log('All bones: '+Object.keys(boneMap).join(', '));
}

// ── Bone lerp (smooth interpolation toward target) ───────────────────────────
//
// Called every RAF tick (60fps). The lerp speed (sp) controls how quickly
// the bone catches up to the target. Lower sp = smoother but laggy.
// Higher sp = snappier but can feel abrupt.
// sp=0.15 at 60fps gives a ~10-frame easing window → silky smooth.
//
function lerpBone(name, tx, ty, tz, sp){
    if(!name) return;
    var b=boneMap[name]; if(!b) return;
    sp = sp!==undefined ? sp : 0.15;
    var s=boneState[name]||(boneState[name]={x:0,y:0,z:0});
    s.x+=(tx-s.x)*sp; s.y+=(ty-s.y)*sp; s.z+=(tz-s.z)*sp;
    b.rotation.set(s.x, s.y, s.z);
}

// Fingers flex around local Z axis
function lerpFinger(name, angle, sp){
    lerpBone(name, 0, 0, angle||0, sp!==undefined?sp:0.20);
}

// ── Finger curl math: angle at joint B between segments A→B and B→C ──────────
//   0 = straight, approaches π when fully curled toward palm
function fingerAngle(A,B,C){
    var dx1=B[0]-A[0], dy1=B[1]-A[1];
    var dx2=C[0]-B[0], dy2=C[1]-B[1];
    var m1=Math.sqrt(dx1*dx1+dy1*dy1)||1e-6;
    var m2=Math.sqrt(dx2*dx2+dy2*dy2)||1e-6;
    var c=(dx1*dx2+dy1*dy2)/(m1*m2);
    return Math.PI - Math.acos(Math.max(-1,Math.min(1,c)));
}

// ── TARGET bone rotations ────────────────────────────────────────────────────
// These are the GOAL values for each bone. The render loop (RAF) lerps toward
// them every frame. Even if keyframes arrive at 20fps, the lerp produces
// visually smooth 60fps motion.
var TARGET = {
    lArmElev:0, lArmSwing:0, lForeElev:0, lForeSwing:0, lHandTilt:0,
    rArmElev:0, rArmSwing:0, rForeElev:0, rForeSwing:0, rHandTilt:0,
    lThumb:[0,0,0], lIndex:[0,0,0], lMiddle:[0,0,0], lRing:[0,0,0], lPinky:[0,0,0],
    rThumb:[0,0,0], rIndex:[0,0,0], rMiddle:[0,0,0], rRing:[0,0,0], rPinky:[0,0,0],
};
var inAnim = false; // true while playAnimation is active

// ── Apply a keyframe: set TARGET values (not bone directly) ──────────────────
//
// RULES:
//  Rule 1 — ARM ANGLES from POSE landmarks (never from hand landmarks).
//    Pose idx: 11=L-Shoulder, 12=R-Shoulder, 13=L-Elbow, 14=R-Elbow,
//              15=L-Wrist, 16=R-Wrist.  All values: x,y ∈ [0,1], y DOWNWARD.
//    elevation = (shoulder_y − elbow_y) × AS   (positive=arm raised)
//    swing     = (elbow_x − shoulder_x) × AS   (positive=arm out)
//
//  Rule 2 — FINGER CURL from vector angle at each joint (fingerAngle fn above).
//    0 = finger straight, π = fully curled. Scale by FS to match rig ROM.
//
//  Rule 3 — SCALE.  AS=3.0 maps ~0.15 image-unit arm diff → ~0.45 rad (~26°).
//            FS=0.60 scales acos result to rig's range of motion.
//
function _setTarget(frame){
    var P=frame.p, L=frame.l, R=frame.r;
    var AS=3.0, FS=0.58;

    // ── Arms (from pose) ─────────────────────────────────────────────────────
    if(P && P.length>=17){
        var lSh=P[11],lEl=P[13],lWr=P[15];
        var rSh=P[12],rEl=P[14],rWr=P[16];

        TARGET.lArmElev  = (lSh[1]-lEl[1])*AS;
        TARGET.lArmSwing = (lEl[0]-lSh[0])*AS;
        TARGET.lForeElev = (lEl[1]-lWr[1])*AS;
        TARGET.lForeSwing= (lWr[0]-lEl[0])*AS;

        TARGET.rArmElev  = (rSh[1]-rEl[1])*AS;
        TARGET.rArmSwing = (rEl[0]-rSh[0])*AS;
        TARGET.rForeElev = (rEl[1]-rWr[1])*AS;
        TARGET.rForeSwing= (rWr[0]-rEl[0])*AS;
    }

    // ── Fingers (from hand landmarks) ────────────────────────────────────────
    function setFing(hand, tgt){
        if(!hand||hand.length<21) return;
        var W=hand[0];
        tgt['Thumb'] =[fingerAngle(W,hand[1],hand[2])*FS, fingerAngle(hand[1],hand[2],hand[3])*FS, fingerAngle(hand[2],hand[3],hand[4])*FS];
        tgt['Index'] =[fingerAngle(W,hand[5],hand[6])*FS, fingerAngle(hand[5],hand[6],hand[7])*FS, fingerAngle(hand[6],hand[7],hand[8])*FS];
        tgt['Middle']=[fingerAngle(W,hand[9],hand[10])*FS,fingerAngle(hand[9],hand[10],hand[11])*FS,fingerAngle(hand[10],hand[11],hand[12])*FS];
        tgt['Ring']  =[fingerAngle(W,hand[13],hand[14])*FS,fingerAngle(hand[13],hand[14],hand[15])*FS,fingerAngle(hand[14],hand[15],hand[16])*FS];
        tgt['Pinky'] =[fingerAngle(W,hand[17],hand[18])*FS,fingerAngle(hand[17],hand[18],hand[19])*FS,fingerAngle(hand[18],hand[19],hand[20])*FS];
    }
    setFing(L, TARGET);  // left  (keys: Thumb/Index/Middle/Ring/Pinky prefixed lF/rF in render)
    // store right separately
    TARGET._lTh=TARGET['Thumb']; TARGET._lIn=TARGET['Index']; TARGET._lMi=TARGET['Middle'];
    TARGET._lRi=TARGET['Ring'];  TARGET._lPi=TARGET['Pinky'];
    setFing(R, TARGET);
    TARGET._rTh=TARGET['Thumb']; TARGET._rIn=TARGET['Index']; TARGET._rMi=TARGET['Middle'];
    TARGET._rRi=TARGET['Ring'];  TARGET._rPi=TARGET['Pinky'];

    // ── Wrist tilt (depth of middle MCP vs wrist) ────────────────────────────
    if(L&&L.length>=10) TARGET.lHandTilt=(L[9][2]-L[0][2])*2.0;
    if(R&&R.length>=10) TARGET.rHandTilt=(R[9][2]-R[0][2])*2.0;
}

// ── RAF render loop — lerps toward TARGET at 60fps ───────────────────────────
//
// The lerp speed (sp=0.15) smoothly eases from the previous bone angle to
// the new target over ~7 frames. Since keyframes arrive every 50ms (20fps)
// and the render loop runs at ~60fps, there are ~3 render frames per keyframe.
// The lerp fills in smooth in-between frames automatically.
//
var SP = 0.15; // lerp speed for animation bones (lower=smoother, higher=snappier)

function _applyTargetToBones(){
    lerpBone(B.lArm,  TARGET.lArmElev,  TARGET.lArmSwing,  0, SP);
    lerpBone(B.lFore, TARGET.lForeElev, TARGET.lForeSwing, 0, SP);
    lerpBone(B.lHand, 0, 0, TARGET.lHandTilt, SP);
    lerpBone(B.rArm,  TARGET.rArmElev,  TARGET.rArmSwing,  0, SP);
    lerpBone(B.rFore, TARGET.rForeElev, TARGET.rForeSwing, 0, SP);
    lerpBone(B.rHand, 0, 0, TARGET.rHandTilt, SP);

    // Left fingers
    ['Thumb','Index','Middle','Ring','Pinky'].forEach(function(f, fi){
        var tgt = [TARGET._lTh, TARGET._lIn, TARGET._lMi, TARGET._lRi, TARGET._lPi][fi];
        var ns  = B.lF[f];
        if(tgt&&ns){ lerpFinger(ns[0],tgt[0],SP); lerpFinger(ns[1],tgt[1],SP); lerpFinger(ns[2],tgt[2],SP); }
    });
    // Right fingers
    ['Thumb','Index','Middle','Ring','Pinky'].forEach(function(f, fi){
        var tgt = [TARGET._rTh, TARGET._rIn, TARGET._rMi, TARGET._rRi, TARGET._rPi][fi];
        var ns  = B.rF[f];
        if(tgt&&ns){ lerpFinger(ns[0],tgt[0],SP); lerpFinger(ns[1],tgt[1],SP); lerpFinger(ns[2],tgt[2],SP); }
    });
}

// ── Idle / Thinking loop (RAF) ────────────────────────────────────────────────
function _startIdleLoop(){
    if(idleRafId!==null) return;
    function tick(){
        if(inAnim){ idleRafId=null; return; }
        idleTime+=0.018;
        _idleFrame();
        idleRafId=requestAnimationFrame(tick);
    }
    idleRafId=requestAnimationFrame(tick);
}
function _stopIdleLoop(){
    if(idleRafId!==null){ cancelAnimationFrame(idleRafId); idleRafId=null; }
}
function _idleFrame(){
    var br=Math.sin(idleTime*.85)*.032, sw=Math.sin(idleTime*.52)*.018;
    var pu=Math.sin(idleTime*1.65)*.010, bo=Math.sin(idleTime*.70)*.008;
    if(currentMode==='thinking'){
        var t1=Math.sin(idleTime*1.3)*.045, t2=Math.sin(idleTime*.9+1)*.025, t3=Math.sin(idleTime*2.1+.5)*.014;
        lerpBone(B.rArm, -0.38+t1*.12, 0.22+t2*.08, 0);
        lerpBone(B.rFore, 0.88+t1*.07, 0, 0);
        lerpBone(B.rHand, 0.10+t2*.05, -0.08+t3*.04, 0);
        ['Thumb','Index','Middle','Ring','Pinky'].forEach(function(f){ var n=(B.rF[f]||[])[0]; if(n) lerpFinger(n,0.12+t3*.05); });
        lerpBone(B.lArm, br*.55, sw, 0); lerpBone(B.lFore, 0.06+pu, 0, 0); lerpBone(B.lHand, bo, 0, 0);
    } else {
        lerpBone(B.lArm, br*.60, sw*.80, 0); lerpBone(B.lFore, pu*.40, 0, 0); lerpBone(B.lHand, bo, 0, 0);
        lerpBone(B.rArm, br*.60,-sw*.80, 0); lerpBone(B.rFore, pu*.40, 0, 0); lerpBone(B.rHand, bo, 0, 0);
        ['Thumb','Index','Middle','Ring','Pinky'].forEach(function(f){
            var ln=(B.lF[f]||[])[0], rn=(B.rF[f]||[])[0];
            if(ln) lerpFinger(ln,0.03); if(rn) lerpFinger(rn,0.03);
        });
    }
}

// ── GLB loading (Flutter calls this after starting HTTP server) ───────────────
window.startLoadAvatar = function(url){
    console.log('Loading GLB from: '+url);
    document.getElementById('statusLabel').textContent='Loading 3D model...';
    var loader = new THREE.GLTFLoader();
    loader.load(url,
        function(gltf){
            var model=gltf.scene;
            var box=new THREE.Box3().setFromObject(model);
            var sz=box.getSize(new THREE.Vector3()), ctr=box.getCenter(new THREE.Vector3());
            var sc=1.6/Math.max(sz.x,sz.y,sz.z);
            model.scale.setScalar(sc);
            model.position.sub(ctr.multiplyScalar(sc));
            model.position.y+=0.05;
            scene.add(model);
            model.traverse(function(o){ if(o.isBone){boneMap[o.name]=o; boneState[o.name]={x:0,y:0,z:0};} });
            model.traverse(function(o){ if(o.isSkinnedMesh&&o.skeleton) o.skeleton.bones.forEach(function(b){ if(!boneMap[b.name]){boneMap[b.name]=b; boneState[b.name]={x:0,y:0,z:0};} }); });
            _resolveBones();
            modelLoaded=true;
            var ov=document.getElementById('overlay');
            ov.style.opacity='0';
            setTimeout(function(){ov.style.display='none';},700);
            _startIdleLoop();
            notify('MODEL_LOADED');
        },
        function(xhr){ if(xhr.total>0) document.getElementById('statusLabel').textContent='Loading... '+Math.round(xhr.loaded/xhr.total*100)+'%'; },
        function(err){ console.error('GLB error:',err); document.getElementById('statusLabel').textContent='Model load failed'; notify('MODEL_LOADED'); }
    );
};

// ── PUBLIC API ────────────────────────────────────────────────────────────────
window.setIdleMode     = function(){ currentMode='idle';     inAnim=false; _startIdleLoop(); };
window.setThinkingMode = function(){ currentMode='thinking'; inAnim=false; _startIdleLoop(); };

/**
 * playAnimation — THE main animation function.
 *
 * Receives ALL frames at once (one bridge call per sign word).
 * Uses setInterval to step through keyframes at `fps` rate (20fps default).
 * The RAF render loop lerps bone angles at 60fps between keyframes → smooth.
 *
 * When done, sends 'ANIMATION_DONE' to Flutter.
 *
 * @param {Object} data  { frames: [{p, l, r}, ...], fps: 20 }
 *   p = pose    : 33 landmarks [[x,y,z], ...]
 *   l = leftHand: 21 landmarks [[x,y,z], ...]
 *   r = rightHand:21 landmarks [[x,y,z], ...]
 */
window.playAnimation = function(data){
    if(!modelLoaded) return;
    var frames = data.frames || [];
    var fps    = data.fps    || 20;
    if(frames.length===0){ notify('ANIMATION_DONE'); return; }

    _stopIdleLoop();
    inAnim = true;
    currentMode = 'animating';
    var idx = 0;

    // setInterval steps keyframes at 20fps
    var timer = setInterval(function(){
        if(idx >= frames.length || !inAnim){
            clearInterval(timer);
            inAnim = false;
            currentMode = 'idle';
            _startIdleLoop();
            notify('ANIMATION_DONE');
            return;
        }
        // Update TARGET — the RAF loop lerps bones toward it at 60fps
        _setTarget(frames[idx]);
        idx++;
    }, Math.round(1000/fps));  // 1000/20 = 50ms per keyframe
};

// ── Render loop (runs at RAF speed, ~60fps) ───────────────────────────────────
(function loop(){
    requestAnimationFrame(loop);
    if(inAnim) _applyTargetToBones();  // lerp bones toward current TARGET
    renderer.render(scene, camera);
})();

window.addEventListener('resize', function(){
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
