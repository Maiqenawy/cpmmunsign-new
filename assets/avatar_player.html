<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!--
  Three.js + GLTFLoader bundled as LOCAL Flutter assets (no CDN).
  avatar.glb is NOT loaded here — Flutter calls window.startLoadAvatar(url)
  after starting a localhost HTTP server so Fetch API works on all devices.
-->
<script src="three.min.js"></script>
<script src="GLTFLoader.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0D1B2A; }
canvas { display: block; width: 100% !important; height: 100% !important; }

/* ── CSS thinking figure — visible immediately, before 3D loads ── */
#overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0D1B2A;
    z-index: 10;
    transition: opacity 0.65s ease;
}
.figure { position: relative; width: 110px; height: 180px; }

.head {
    position: absolute; top: 0; left: 50%;
    transform: translateX(-50%);
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #4ecdc4, #2a9d8f);
    box-shadow: 0 0 18px rgba(78,205,196,0.4);
    animation: headBob 2.4s ease-in-out infinite;
}
.body {
    position: absolute; top: 50px; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 56px;
    background: linear-gradient(to bottom, #4ecdc4, #264653);
    border-radius: 3px;
}
.arm-left {
    position: absolute; top: 54px; left: 18px;
    width: 6px; height: 44px; background: #4ecdc4; border-radius: 3px;
    transform-origin: top center;
    animation: armLeftRelax 2.4s ease-in-out infinite;
}
.arm-right {
    position: absolute; top: 54px; right: 18px;
    width: 6px; height: 36px; background: #4ecdc4; border-radius: 3px;
    transform-origin: top center;
    animation: armRightThink 2.4s ease-in-out infinite;
}
.forearm-right {
    position: absolute; top: 82px; right: 10px;
    width: 6px; height: 28px; background: #2a9d8f; border-radius: 3px;
    transform-origin: top center;
    animation: forearmThink 2.4s ease-in-out infinite;
}
.leg { position: absolute; top: 106px; width: 6px; height: 50px;
    background: linear-gradient(to bottom, #264653, #1a3344); border-radius: 3px;
    animation: legSway 2.4s ease-in-out infinite;
}
.leg-left  { left: 40px;  animation-delay: 0s;    }
.leg-right { right: 40px; animation-delay: 0.3s;  }

.dots { display: flex; gap: 6px; margin-top: 24px; }
.dot {
    width: 8px; height: 8px; border-radius: 50%; background: #4ecdc4;
    animation: dotPulse 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
.label { margin-top: 14px; color: rgba(78,205,196,0.7); font-family: sans-serif; font-size: 12px; letter-spacing: 0.5px; }

@keyframes headBob    { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-4px)} }
@keyframes armLeftRelax { 0%,100%{transform:rotate(8deg)} 50%{transform:rotate(-4deg)} }
@keyframes armRightThink{ 0%,100%{transform:rotate(-50deg)} 50%{transform:rotate(-58deg)} }
@keyframes forearmThink { 0%,100%{transform:rotate(80deg)} 50%{transform:rotate(88deg)} }
@keyframes legSway      { 0%,100%{transform:rotate(2deg)} 50%{transform:rotate(-2deg)} }
@keyframes dotPulse     { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
</style>
</head>
<body>

<!-- CSS thinking figure — shown until 3D model is ready -->
<div id="overlay">
    <div class="figure">
        <div class="head"></div>
        <div class="body"></div>
        <div class="arm-left"></div>
        <div class="arm-right"></div>
        <div class="forearm-right"></div>
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
    </div>
    <div class="dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="label" id="statusLabel">Preparing avatar...</div>
</div>

<script>
// ─── Guard ───────────────────────────────────────────────────────────────────
if (typeof THREE === 'undefined') {
    document.getElementById('statusLabel').textContent = '3D engine missing';
    console.error('THREE not loaded — three.min.js did not execute');
}

// ─── flutter_inappwebview bridge ─────────────────────────────────────────────
var _pendingMsgs = [];
var _bridgeReady = false;

window.addEventListener('flutterInAppWebViewPlatformReady', function () {
    _bridgeReady = true;
    _pendingMsgs.forEach(function (m) {
        window.flutter_inappwebview.callHandler('FlutterBridge', m);
    });
    _pendingMsgs = [];
});

function notifyFlutter(msg) {
    if (_bridgeReady && window.flutter_inappwebview) {
        window.flutter_inappwebview.callHandler('FlutterBridge', msg);
    } else {
        _pendingMsgs.push(msg); // delivered once platform fires ready event
    }
}

// ─── Three.js setup ──────────────────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x0D1B2A);

var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 2.8);
camera.lookAt(0, 0.8, 0);

// Bright, multi-angle lighting so the avatar is always well-lit
scene.add(new THREE.AmbientLight(0xffffff, 2.0));
var key = new THREE.DirectionalLight(0xfff5e0, 1.4);
key.position.set(0.5, 2, 2); scene.add(key);
var fill = new THREE.DirectionalLight(0x80b4ff, 0.8);
fill.position.set(-2, 1, 0); scene.add(fill);
var rim = new THREE.DirectionalLight(0xffffff, 0.5);
rim.position.set(0, 1, -2); scene.add(rim);

// ─── State ───────────────────────────────────────────────────────────────────
var boneMap    = {};
var boneState  = {};
var currentMode = 'thinking'; // starts in thinking to match the CSS figure
var idleTime   = 0;
var idleRafId  = null;
var modelLoaded = false;

// ─── Bone lerp helpers ────────────────────────────────────────────────────────
function lerpBone(name, tx, ty, tz, speed) {
    var bone = boneMap[name]; if (!bone) return;
    var sp = speed !== undefined ? speed : 0.07;
    var s  = boneState[name] || (boneState[name] = {x:0,y:0,z:0});
    s.x += (tx - s.x) * sp;
    s.y += (ty - s.y) * sp;
    s.z += (tz - s.z) * sp;
    bone.rotation.set(s.x, s.y, s.z);
}
function lerpFinger(name, val, speed) {
    lerpBone(name, 0, 0, val * 2.0, speed !== undefined ? speed : 0.07);
}

// ─── GLB loading — triggered by Flutter after HTTP server is ready ────────────
//
// Flutter calls: window.startLoadAvatar("http://127.0.0.1:PORT/avatar.glb")
//
window.startLoadAvatar = function (url) {
    console.log('Loading GLB from: ' + url);
    document.getElementById('statusLabel').textContent = 'Loading 3D model...';

    var loader = new THREE.GLTFLoader();

    loader.load(
        url,

        // ── onLoad ─────────────────────────────────────────────────────────
        function (gltf) {
            var model = gltf.scene;

            // Auto-fit the model inside the camera view
            var box    = new THREE.Box3().setFromObject(model);
            var size   = box.getSize(new THREE.Vector3());
            var center = box.getCenter(new THREE.Vector3());
            var scale  = 1.6 / Math.max(size.x, size.y, size.z);
            model.scale.setScalar(scale);
            model.position.sub(center.multiplyScalar(scale));
            model.position.y += 0.05;
            scene.add(model);

            // Build bone lookup map
            model.traverse(function (obj) {
                if (obj.isBone) { boneMap[obj.name] = obj; boneState[obj.name] = {x:0,y:0,z:0}; }
            });
            model.traverse(function (obj) {
                if (obj.isSkinnedMesh && obj.skeleton) {
                    obj.skeleton.bones.forEach(function (b) {
                        if (!boneMap[b.name]) { boneMap[b.name] = b; boneState[b.name] = {x:0,y:0,z:0}; }
                    });
                }
            });

            console.log('BONES: ' + Object.keys(boneMap).join(', '));
            modelLoaded = true;

            // Fade out the CSS overlay → reveal 3D avatar
            var overlay = document.getElementById('overlay');
            overlay.style.opacity = '0';
            setTimeout(function () { overlay.style.display = 'none'; }, 700);

            // Start 3D thinking animation (matches the CSS figure state)
            _startIdleLoop();

            notifyFlutter('MODEL_LOADED');
        },

        // ── onProgress ─────────────────────────────────────────────────────
        function (xhr) {
            if (xhr.total > 0) {
                var pct = Math.round((xhr.loaded / xhr.total) * 100);
                document.getElementById('statusLabel').textContent =
                    'Loading 3D model... ' + pct + '%';
            }
        },

        // ── onError ────────────────────────────────────────────────────────
        function (err) {
            console.error('GLB load error:', err);
            document.getElementById('statusLabel').textContent = 'Model load failed';
            // Unblock Flutter even on error
            notifyFlutter('MODEL_LOADED');
        }
    );
};

// ─── Idle / Thinking animation loop (RAF) ────────────────────────────────────
function _startIdleLoop() {
    if (idleRafId !== null) return;
    function tick() {
        if (currentMode === 'animating') { idleRafId = null; return; }
        idleTime += 0.018;
        _runIdleFrame();
        idleRafId = requestAnimationFrame(tick);
    }
    idleRafId = requestAnimationFrame(tick);
}
function _stopIdleLoop() {
    if (idleRafId !== null) { cancelAnimationFrame(idleRafId); idleRafId = null; }
}

function _runIdleFrame() {
    var breathe = Math.sin(idleTime * 0.85)       * 0.032;
    var sway    = Math.sin(idleTime * 0.52)       * 0.018;
    var pulse   = Math.sin(idleTime * 1.65)       * 0.010;
    var bob     = Math.sin(idleTime * 0.70)       * 0.008;

    if (currentMode === 'thinking') {
        var th1 = Math.sin(idleTime * 1.30)       * 0.045;
        var th2 = Math.sin(idleTime * 0.90 + 1.0) * 0.025;
        var th3 = Math.sin(idleTime * 2.10 + 0.5) * 0.014;

        lerpBone('RightArm',    -0.38 + th1*0.12,  0.22 + th2*0.08, 0);
        lerpBone('RightForeArm', 0.88 + th1*0.07,  0.0,             0);
        lerpBone('RightHand',    0.10 + th2*0.05, -0.08+th3*0.04,   0);
        lerpFinger('RightHandThumb1',  0.18 + th3*0.10);
        lerpFinger('RightHandIndex1',  0.14 + th3*0.08);
        lerpFinger('RightHandMiddle1', 0.10);
        lerpFinger('RightHandRing1',   0.12);
        lerpFinger('RightHandPinky1',  0.10);

        lerpBone('LeftArm',     breathe*0.55,  sway, 0);
        lerpBone('LeftForeArm', 0.06+pulse,    0.0,  0);
        lerpBone('LeftHand',    bob,           0.0,  0);
        lerpFinger('LeftHandThumb1',  0.04);
        lerpFinger('LeftHandIndex1',  0.04);
        lerpFinger('LeftHandMiddle1', 0.04);
        lerpFinger('LeftHandRing1',   0.04);
        lerpFinger('LeftHandPinky1',  0.04);
    } else {
        lerpBone('LeftArm',      breathe*0.60,  sway*0.80, 0);
        lerpBone('LeftForeArm',  pulse*0.40,    0.0,       0);
        lerpBone('LeftHand',     bob,           0.0,       0);
        lerpBone('RightArm',     breathe*0.60, -sway*0.80, 0);
        lerpBone('RightForeArm', pulse*0.40,    0.0,       0);
        lerpBone('RightHand',    bob,           0.0,       0);
        ['Left','Right'].forEach(function(s){
            ['Thumb','Index','Middle','Ring','Pinky'].forEach(function(f){
                lerpFinger(s+'Hand'+f+'1', 0.03);
            });
        });
    }
}

// ─── Public API ───────────────────────────────────────────────────────────────
window.setIdleMode = function () {
    currentMode = 'idle'; _startIdleLoop();
    console.log('Avatar: IDLE');
};
window.setThinkingMode = function () {
    currentMode = 'thinking'; _startIdleLoop();
    console.log('Avatar: THINKING');
};
window.animateFrame = function (frame) {
    try {
        if (!modelLoaded) return;
        _stopIdleLoop();
        currentMode = 'animating';
        var L = frame.leftHand, R = frame.rightHand;
        if (!L || !R) return;
        var S = 0.30;

        lerpBone('LeftArm',      L[0][1]*0.8,  L[0][0]*0.8,  0, S);
        lerpBone('LeftForeArm',  L[5][1]*0.7,  L[5][0]*0.7,  0, S);
        lerpBone('LeftHand',     L[9][1]*0.5,  L[9][0]*0.5,  0, S);
        lerpBone('RightArm',     R[0][1]*0.8,  R[0][0]*0.8,  0, S);
        lerpBone('RightForeArm', R[5][1]*0.7,  R[5][0]*0.7,  0, S);
        lerpBone('RightHand',    R[9][1]*0.5,  R[9][0]*0.5,  0, S);

        // Left fingers
        for(var i=1;i<=4;i++) lerpFinger('LeftHandThumb'+i,   L[i][1],   S);
        for(var i=5;i<=8;i++) lerpFinger('LeftHandIndex'+(i-4),  L[i][1], S);
        for(var i=9;i<=12;i++)lerpFinger('LeftHandMiddle'+(i-8), L[i][1], S);
        for(var i=13;i<=16;i++)lerpFinger('LeftHandRing'+(i-12),  L[i][1], S);
        for(var i=17;i<=20;i++)lerpFinger('LeftHandPinky'+(i-16), L[i][1], S);

        // Right fingers
        for(var i=1;i<=4;i++) lerpFinger('RightHandThumb'+i,   R[i][1],   S);
        for(var i=5;i<=8;i++) lerpFinger('RightHandIndex'+(i-4),  R[i][1], S);
        for(var i=9;i<=12;i++)lerpFinger('RightHandMiddle'+(i-8), R[i][1], S);
        for(var i=13;i<=16;i++)lerpFinger('RightHandRing'+(i-12),  R[i][1], S);
        for(var i=17;i<=20;i++)lerpFinger('RightHandPinky'+(i-16), R[i][1], S);
    } catch(e) { console.error('animateFrame:', e); }
};

// ─── Render loop ─────────────────────────────────────────────────────────────
(function loop() {
    requestAnimationFrame(loop);
    renderer.render(scene, camera);
})();

window.addEventListener('resize', function () {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
