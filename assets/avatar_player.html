<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<style>

html,
body,
#renderCanvas
{
    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;
}

</style>

</head>

<body>

<canvas id="renderCanvas"></canvas>

<script>

const canvas =
document.getElementById("renderCanvas");

const engine =
new BABYLON.Engine(canvas,true);

let scene;
let skeleton;

const createScene = async () =>
{
    scene = new BABYLON.Scene(engine);

    const camera =
    new BABYLON.ArcRotateCamera(
        "camera",
        Math.PI / 2,
        Math.PI / 2.5,
        2,
        BABYLON.Vector3.Zero(),
        scene
    );

    camera.attachControl(canvas,true);

    const light =
    new BABYLON.HemisphericLight(
        "light",
        new BABYLON.Vector3(0,1,0),
        scene
    );

  try {

    const result =
    await BABYLON.SceneLoader.ImportMeshAsync(
        "",
        "flutter_assets/assets/",
        "avatar.glb",
        scene
    );

    console.log("GLB Loaded");

    if(result.skeletons.length > 0)
    {
        skeleton = result.skeletons[0];

        console.log(
            skeleton.bones.map(
                b => b.name
            )
        );
    }

}
catch(e)
{
    console.error(e);
}

    if(result.skeletons.length > 0)
    {
        skeleton =
        result.skeletons[0];

        console.log(
            skeleton.bones.map(
                b => b.name
            )
        );
    }

    return scene;
};

createScene();

engine.runRenderLoop(() =>
{
    if(scene)
    {
        scene.render();
    }
});

window.addEventListener(
    "resize",
    () =>
    {
        engine.resize();
    }
);

window.animateFrame = function(frame)
{
    console.log(frame);
};

</script>

</body>
</html>
