<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<style>

html,
body,
#renderCanvas
{
    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;
}

</style>

</head>

<body>

<canvas id="renderCanvas"></canvas>

<script>

const canvas =
document.getElementById("renderCanvas");

const engine =
new BABYLON.Engine(canvas,true);

let scene;
let skeleton;

const createScene = async () =>
{
    scene = new BABYLON.Scene(engine);

    const camera =
    new BABYLON.ArcRotateCamera(
        "camera",
        Math.PI / 2,
        Math.PI / 2.5,
        2,
        BABYLON.Vector3.Zero(),
        scene
    );

    camera.attachControl(canvas,true);

    new BABYLON.HemisphericLight(
        "light",
        new BABYLON.Vector3(0,1,0),
        scene
    );

    try {

        const result =
        await BABYLON.SceneLoader.ImportMeshAsync(
            "",
            "flutter_assets/assets/",
            "avatar.glb",
            scene
        );

        console.log("GLB Loaded");

        if(result.skeletons.length > 0)
        {
            skeleton = result.skeletons[0];
             console.log(skeleton.bones.map(b => b.name));

    window.MODEL_LOADED = true;

            console.log(
                skeleton.bones.map(
                    b => b.name
                )
                window.isJsReady = true;
console.log("JS_READY"
            );

            console.log("MODEL_LOADED");
window.MODEL_LOADED = true;
        }

    }
    catch(e)
    {
        console.error("GLB ERROR:", e);
    }

    return scene;
};
createScene();

engine.runRenderLoop(() =>
{
    if(scene)
    {
        scene.render();
    }
});

window.addEventListener(
    "resize",
    () =>
    {
        engine.resize();
    }
);

function rotateFinger(boneName, value)
{
    if(!skeleton) return;

    const bone =
        skeleton.bones.find(
            b => b.name === boneName
        );

    if(!bone) return;

    bone.setRotation(
        new BABYLON.Vector3(
            0,
            0,
            value * 2.0
        )
    );
}

function rotateBone(
    boneName,
    x,
    y,
    z
)
{
    if(!skeleton) return;

    const bone =
        skeleton.bones.find(
            b => b.name === boneName
        );

    if(!bone) return;

    bone.setRotation(
        new BABYLON.Vector3(
            x,
            y,
            z
        )
    );
}

window.animateFrame = function(frame)
{
  
    if(!skeleton) return;
    if (!window.MODEL_LOADED) return;

    const left = frame.leftHand;
    const right = frame.rightHand;
// ================= LEFT ARM =================

rotateBone(
    "LeftArm",
    left[0][1] * 0.8,
    left[0][0] * 0.8,
    0
);

rotateBone(
    "LeftForeArm",
    left[5][1] * 0.7,
    left[5][0] * 0.7,
    0
);

rotateBone(
    "LeftHand",
    left[9][1] * 0.5,
    left[9][0] * 0.5,
    0
);

// ================= RIGHT ARM =================

rotateBone(
    "RightArm",
    right[0][1] * 0.8,
    right[0][0] * 0.8,
    0
);

rotateBone(
    "RightForeArm",
    right[5][1] * 0.7,
    right[5][0] * 0.7,
    0
);

rotateBone(
    "RightHand",
    right[9][1] * 0.5,
    right[9][0] * 0.5,
    0
);
    // Left Thumb
    rotateFinger("LeftHandThumb1", left[1][1]);
    rotateFinger("LeftHandThumb2", left[2][1]);
    rotateFinger("LeftHandThumb3", left[3][1]);
    rotateFinger("LeftHandThumb4", left[4][1]);

    // Left Index
    rotateFinger("LeftHandIndex1", left[5][1]);
    rotateFinger("LeftHandIndex2", left[6][1]);
    rotateFinger("LeftHandIndex3", left[7][1]);
    rotateFinger("LeftHandIndex4", left[8][1]);

    // Left Middle
    rotateFinger("LeftHandMiddle1", left[9][1]);
    rotateFinger("LeftHandMiddle2", left[10][1]);
    rotateFinger("LeftHandMiddle3", left[11][1]);
    rotateFinger("LeftHandMiddle4", left[12][1]);

    // Left Ring
    rotateFinger("LeftHandRing1", left[13][1]);
    rotateFinger("LeftHandRing2", left[14][1]);
    rotateFinger("LeftHandRing3", left[15][1]);
    rotateFinger("LeftHandRing4", left[16][1]);

    // Left Pinky
    rotateFinger("LeftHandPinky1", left[17][1]);
    rotateFinger("LeftHandPinky2", left[18][1]);
    rotateFinger("LeftHandPinky3", left[19][1]);
    rotateFinger("LeftHandPinky4", left[20][1]);

    // Right Thumb
    rotateFinger("RightHandThumb1", right[1][1]);
    rotateFinger("RightHandThumb2", right[2][1]);
    rotateFinger("RightHandThumb3", right[3][1]);
    rotateFinger("RightHandThumb4", right[4][1]);

    // Right Index
    rotateFinger("RightHandIndex1", right[5][1]);
    rotateFinger("RightHandIndex2", right[6][1]);
    rotateFinger("RightHandIndex3", right[7][1]);
    rotateFinger("RightHandIndex4", right[8][1]);

    // Right Middle
    rotateFinger("RightHandMiddle1", right[9][1]);
    rotateFinger("RightHandMiddle2", right[10][1]);
    rotateFinger("RightHandMiddle3", right[11][1]);
    rotateFinger("RightHandMiddle4", right[12][1]);

    // Right Ring
    rotateFinger("RightHandRing1", right[13][1]);
    rotateFinger("RightHandRing2", right[14][1]);
    rotateFinger("RightHandRing3", right[15][1]);
    rotateFinger("RightHandRing4", right[16][1]);

    // Right Pinky
    rotateFinger("RightHandPinky1", right[17][1]);
    rotateFinger("RightHandPinky2", right[18][1]);
    rotateFinger("RightHandPinky3", right[19][1]);
    rotateFinger("RightHandPinky4", right[20][1]);
}

</script>

</body>
</html>
