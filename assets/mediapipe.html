<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <script src="https://unpkg.com/@mediapipe/holistic/holistic.js"></script>
  <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body style="margin:0; background:black; overflow:hidden;">

<video id="video"
  autoplay
  playsinline
  muted
  style="width:100%; height:100%; object-fit:cover;">
</video>

<script>

const video = document.getElementById("video");

// ================= STATE =================
let running = true;
let lastSent = 0;
let camera = null;
let lastFrame = null;

// ================= HOLISTIC =================
const holistic = new Holistic({
  locateFile: (file) =>
    `https://unpkg.com/@mediapipe/holistic/${file}`
});

holistic.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6,
});

console.log("READY");

// ================= NORMALIZATION =================
function normalizeHand(hand) {
  if (!hand || hand.length !== 21) return Array(63).fill(0);

  const base = hand[0]; // wrist

  return hand.flatMap(lm => [
    lm.x - base.x,
    lm.y - base.y,
    lm.z - base.z
  ]);
}

// ================= RESULTS =================
holistic.onResults((results) => {

  if (!running) return;

  let keypoints = [];

  // 🔥 LEFT HAND ONLY
  keypoints.push(
    ...normalizeHand(results.leftHandLandmarks)
  );

  // 🔥 RIGHT HAND ONLY
  keypoints.push(
    ...normalizeHand(results.rightHandLandmarks)
  );

  // VALIDATE SIZE (126 values only)
  if (keypoints.length !== 126) return;

  // 🔥 MOTION DETECTION (important fix)
  let motion = false;

  if (lastFrame) {
    for (let i = 0; i < keypoints.length; i++) {
      if (Math.abs(keypoints[i] - lastFrame[i]) > 0.003) {
        motion = true;
        break;
      }
    }
  } else {
    motion = true;
  }

  lastFrame = keypoints;

  if (!motion) return;

  // THROTTLE
  const now = Date.now();
  if (now - lastSent < 120) return;
  lastSent = now;

  // SEND TO FLUTTER
  try {
    if (window.SignChannel) {
      window.SignChannel.postMessage(
        JSON.stringify(keypoints)
      );
    }
  } catch (e) {
    console.log("ERROR:", e);
  }

});

// ================= CAMERA =================
async function startCamera() {

  camera = new Camera(video, {
    onFrame: async () => {
      if (!running) return;
      if (video.readyState < 2) return;

      await holistic.send({ image: video });
    },
    width: 640,
    height: 480
  });

  camera.start();
}

startCamera();

</script>

</body>
</html>
