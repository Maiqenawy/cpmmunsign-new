<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />

  <script src="https://unpkg.com/@mediapipe/holistic/holistic.js"></script>

  <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body style="margin:0; overflow:hidden; background:black;">

<video
  id="video"
  autoplay
  playsinline
  muted
  style="width:100%; height:100%; object-fit:cover;"
></video>

<script>

const video = document.getElementById("video");

console.log("HTML STARTED");

// ================= FACE INDEXES =================
const FACE_INDEXES = [
  33,133,160,159,158,157,173,246,
  362,263,387,386,385,384,398,466,
  1,2,98,327,
  61,146,91,181,84,17,314,405,
  321,375,291,78,95,88,178,87,
  14,317,402,318
];

// ================= HOLISTIC =================
const holistic = new Holistic({

  locateFile: (file) => {
    return `https://unpkg.com/@mediapipe/holistic/${file}`;
  }

});

holistic.setOptions({

  modelComplexity: 1,
  smoothLandmarks: true,
  refineFaceLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5,

});

console.log("HOLISTIC READY");

// ================= RESULTS =================
let lastSent = 0;

holistic.onResults((results) => {

  let keypoints = [];

  // LEFT HAND
  if (results.leftHandLandmarks) {

    results.leftHandLandmarks.forEach(lm => {
      keypoints.push(lm.x, lm.y, lm.z);
    });

  } else {

    keypoints.push(...Array(63).fill(0));
  }

  // RIGHT HAND
  if (results.rightHandLandmarks) {

    results.rightHandLandmarks.forEach(lm => {
      keypoints.push(lm.x, lm.y, lm.z);
    });

  } else {

    keypoints.push(...Array(63).fill(0));
  }

  // FACE
  if (results.faceLandmarks) {

    FACE_INDEXES.forEach(i => {

      const lm = results.faceLandmarks[i];

      if (lm) {
        keypoints.push(lm.x, lm.y, lm.z);
      } else {
        keypoints.push(0,0,0);
      }
    });

  } else {

    keypoints.push(...Array(120).fill(0));
  }

  // VALIDATE
  if (keypoints.length !== 246) {

    console.log("INVALID FEATURES:", keypoints.length);

    return;
  }

  // THROTTLE
  const now = Date.now();

  if (now - lastSent < 100) return;

  lastSent = now;

  console.log("SENDING TO FLUTTER");

  // SEND TO FLUTTER
  try {

    SignChannel.postMessage(
      JSON.stringify(keypoints)
    );

  } catch (e) {

    console.log("CHANNEL ERROR:", e);
  }
});

// ================= START CAMERA =================
async function startCamera() {

  try {

    console.log("REQUEST CAMERA");

    const stream = await navigator.mediaDevices.getUserMedia({

      video: true,
      audio: false

    });

    console.log("CAMERA GRANTED");

    video.srcObject = stream;

    await video.play();

    console.log(
      "VIDEO SIZE:",
      video.videoWidth,
      video.videoHeight
    );

    const camera = new Camera(video, {

      onFrame: async () => {

        await holistic.send({
          image: video
        });

      },

      width: 640,
      height: 480,
    });

    camera.start();

    console.log("CAMERA STARTED");

  } catch (err) {

    console.log("CAMERA ERROR:", err);

    document.body.innerHTML += `
      <div style="
        position:absolute;
        top:20px;
        left:20px;
        color:white;
        background:red;
        padding:10px;
        z-index:999;
      ">
        ${err}
      </div>
    `;
  }
}

startCamera();

</script>

</body>
</html>
