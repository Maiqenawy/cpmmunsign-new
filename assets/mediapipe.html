<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <script src="https://unpkg.com/@mediapipe/holistic/holistic.js"></script>
  <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body style="margin:0; background:black; overflow:hidden;">

<video id="video"
  autoplay
  playsinline
  muted
  style="width:100%; height:100%; object-fit:cover;">
</video>

<script>

const video = document.getElementById("video");

// ================= STATE =================
let running = true;
let lastSent = 0;
let camera = null;

// ================= FACE INDEXES =================
const FACE_INDEXES = [
  33,133,160,159,158,157,173,246,
  362,263,387,386,385,384,398,466,
  1,2,98,327,
  61,146,91,181,84,17,314,405,
  321,375,291,78,95,88,178,87,
  14,317,402,318
];

// ================= HOLISTIC =================
const holistic = new Holistic({

  locateFile: (file) =>
    `https://unpkg.com/@mediapipe/holistic/${file}`
});

holistic.setOptions({

  modelComplexity: 1,
  smoothLandmarks: true,
  refineFaceLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6,

});

console.log("HOLISTIC READY");

// ================= CLEAN RESULTS =================
holistic.onResults((results) => {

  if (!running) return;

  const keypoints = [];

  // LEFT HAND
  if (results.leftHandLandmarks?.length === 21) {
    results.leftHandLandmarks.forEach(lm => {
      keypoints.push(lm.x, lm.y, lm.z);
    });
  } else {
    keypoints.push(...Array(63).fill(0));
  }

  // RIGHT HAND
  if (results.rightHandLandmarks?.length === 21) {
    results.rightHandLandmarks.forEach(lm => {
      keypoints.push(lm.x, lm.y, lm.z);
    });
  } else {
    keypoints.push(...Array(63).fill(0));
  }

  // FACE (safe access)
  if (results.faceLandmarks?.length >= 468) {

    FACE_INDEXES.forEach(i => {
      const lm = results.faceLandmarks[i];
      if (lm) {
        keypoints.push(lm.x, lm.y, lm.z);
      } else {
        keypoints.push(0, 0, 0);
      }
    });

  } else {
    keypoints.push(...Array(FACE_INDEXES.length * 3).fill(0));
  }

  // VALIDATE
  if (keypoints.length !== 246) return;

  // THROTTLE (stable)
  const now = Date.now();
  if (now - lastSent < 120) return;
  lastSent = now;

  // SEND TO FLUTTER
  try {
    if (window.SignChannel && running) {

      window.SignChannel.postMessage(
        JSON.stringify(keypoints)
      );
    }
  } catch (e) {
    console.log("CHANNEL ERROR:", e);
  }

});

// ================= CAMERA (ONLY ONE SOURCE) =================
async function startCamera() {

  try {

    console.log("STARTING CAMERA");

    camera = new Camera(video, {

      onFrame: async () => {

        if (!running) return;
        if (video.readyState < 2) return;

        try {
          await holistic.send({ image: video });
        } catch (e) {
          console.log("FRAME ERROR:", e);
        }

      },

      width: 640,
      height: 480
    });

    camera.start();

    console.log("CAMERA STARTED");

  } catch (err) {
    console.log("CAMERA ERROR:", err);
  }
}

// ================= CLEAN EXIT =================
function stopEverything() {

  running = false;

  try {
    if (camera) camera.stop();
  } catch (e) {}

  try {
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
    }
  } catch (e) {}

  console.log("STOPPED CLEANLY");
}

// Flutter / WebView lifecycle hooks
window.addEventListener("beforeunload", stopEverything);
window.addEventListener("pagehide", stopEverything);

// Safety heartbeat (detect freeze)
setInterval(() => {
  if (!running) return;
  console.log("ALIVE");
}, 5000);

// START
startCamera();

</script>

</body>
</html>
