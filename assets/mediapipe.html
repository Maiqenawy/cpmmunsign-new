<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <script src="https://unpkg.com/@mediapipe/holistic/holistic.js"></script>
  <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body style="margin:0; background:black; overflow:hidden;">

<video id="video"
  autoplay
  playsinline
  muted
  style="width:100%; height:100%; object-fit:cover;">
</video>

<script>

const video = document.getElementById("video");

let running = true;
let lastSent = 0;
let camera = null;
let lastFrame = null;

const holistic = new Holistic({
  locateFile: (file) =>
    `https://unpkg.com/@mediapipe/holistic/${file}`
});

holistic.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6,
});

console.log("READY");
  setInterval(() => {

  try {

    if (window.SignChannel) {

      console.log(
        "SENDING TEST"
      );

      window.SignChannel.postMessage(
        "HELLO"
      );
    }

  } catch(e) {

    console.log(e);
  }

}, 3000);

function normalizeHand(hand) {

  if (!hand || hand.length !== 21)
     console.log("HAND NOT DETECTED");
    return Array(63).fill(0);

  const base = hand[0];

  return hand.flatMap(lm => [
    lm.x - base.x,
    lm.y - base.y,
    lm.z - base.z
  ]);
}

function normalizeFace(face) {

  if (!face || face.length < 40)
     console.log("FACE NOT DETECTED");
    return Array(120).fill(0);

  const base = face[1];

  let result = [];

  for (let i = 0; i < 40; i++) {

    result.push(
      face[i].x - base.x,
      face[i].y - base.y,
      face[i].z - base.z
    );
  }

  return result;
}

holistic.onResults((results) => {
  console.log(
  "LEFT:",
  results.leftHandLandmarks
);

console.log(
  "RIGHT:",
  results.rightHandLandmarks
);

console.log(
  "FACE:",
  results.faceLandmarks
);

  if (!running) return;

  let keypoints = [];

  // Left Hand = 63
  keypoints.push(
    ...normalizeHand(results.leftHandLandmarks)
  );

  // Right Hand = 63
  keypoints.push(
    ...normalizeHand(results.rightHandLandmarks)
  );

  // Face = 120
  keypoints.push(
    ...normalizeFace(results.faceLandmarks)
  );

  if (keypoints.length !== 246) {

    console.log(
      "INVALID FEATURES:",
      keypoints.length
    );

    return;
  }

  let motion = false;

  if (lastFrame) {

    for (let i = 0; i < keypoints.length; i++) {

      if (
        Math.abs(
          keypoints[i] - lastFrame[i]
        ) > 0.003
      ) {
        motion = true;
        break;
      }
    }

  } else {

    motion = true;
  }

  lastFrame = keypoints;

  if (!motion) return;

  const now = Date.now();

  if (now - lastSent < 120)
    return;

  lastSent = now;

  try {

    if (window.SignChannel) {

      window.SignChannel.postMessage(
        JSON.stringify(keypoints)
      );
    }

  } catch (e) {

    console.log(e);
  }

});

async function startCamera() {

  camera = new Camera(video, {
    onFrame: async () => {

      if (!running) return;

      if (video.readyState < 2)
        return;

      await holistic.send({
        image: video
      });
    },
    width: 640,
    height: 480
  });

  camera.start();
}

startCamera();

</script>
