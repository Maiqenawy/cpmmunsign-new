<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body style="margin:0; overflow:hidden; background:black;">

<video
  id="video"
  autoplay
  playsinline
  style="width:100%; height:100%; object-fit:cover;"
></video>

<script>

const video = document.getElementById("video");

// ================= FACE INDEXES =================
const FACE_INDEXES = [
  33,133,160,159,158,157,173,246,
  362,263,387,386,385,384,398,466,
  1,2,98,327,
  61,146,91,181,84,17,314,405,
  321,375,291,78,95,88,178,87,
  14,317,402,318
];

// ================= HOLISTIC =================
const holistic = new Holistic({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
  }
});

holistic.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  refineFaceLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5,
});

// ================= FRAME BUFFER =================
let lastSent = 0;

// ================= RESULTS =================
holistic.onResults((results) => {

  let keypoints = [];

  // ================= LEFT HAND =================
  if (results.leftHandLandmarks) {

    results.leftHandLandmarks.forEach(lm => {
      keypoints.push(lm.x, lm.y, lm.z);
    });

  } else {

    keypoints.push(...Array(63).fill(0));
  }

  // ================= RIGHT HAND =================
  if (results.rightHandLandmarks) {

    results.rightHandLandmarks.forEach(lm => {
      keypoints.push(lm.x, lm.y, lm.z);
    });

  } else {

    keypoints.push(...Array(63).fill(0));
  }

  // ================= FACE =================
  if (results.faceLandmarks) {

    FACE_INDEXES.forEach(i => {

      const lm = results.faceLandmarks[i];

      if (lm) {
        keypoints.push(lm.x, lm.y, lm.z);
      } else {
        keypoints.push(0, 0, 0);
      }
    });

  } else {

    keypoints.push(...Array(120).fill(0));
  }

  // ================= VALIDATE =================
  if (keypoints.length !== 246) {
    console.log("INVALID FEATURES:", keypoints.length);
    return;
  }

  // ================= THROTTLE =================
  const now = Date.now();

  // إرسال كل 100ms تقريبًا
  if (now - lastSent < 100) return;

  lastSent = now;

  // ================= SEND TO FLUTTER =================
  try {

    SignChannel.postMessage(
      JSON.stringify(keypoints)
    );

  } catch (e) {

    console.log("Flutter channel error:", e);
  }
});

// ================= CAMERA =================
const camera = new Camera(video, {

  onFrame: async () => {

    await holistic.send({
      image: video
    });
  },

  width: 640,
  height: 480,
});

camera.start();

</script>

</body>
</html>
