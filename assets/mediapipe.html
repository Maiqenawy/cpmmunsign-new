<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body style="margin:0; overflow:hidden;">
<video id="video" autoplay playsinline style="display:none;"></video>

<script>
const video = document.getElementById("video");

const holistic = new Holistic({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
  }
});

holistic.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  enableSegmentation: false,
  refineFaceLandmarks: false
});

// ================= FIXED FRAME HANDLER =================
holistic.onResults((results) => {

  let keypoints = [];

  // ================= POSE (33 landmarks × 4 = 132) =================
  if (results.poseLandmarks) {
    results.poseLandmarks.forEach(lm => {
      keypoints.push(lm.x, lm.y, lm.z, lm.visibility);
    });
  } else {
    keypoints.push(...Array(132).fill(0));
  }

  // ================= LEFT HAND (21 × 3 = 63) =================
  if (results.leftHandLandmarks) {
    results.leftHandLandmarks.forEach(lm => {
      keypoints.push(lm.x, lm.y, lm.z);
    });
  } else {
    keypoints.push(...Array(63).fill(0));
  }

  // ================= RIGHT HAND (21 × 3 = 63) =================
  if (results.rightHandLandmarks) {
    results.rightHandLandmarks.forEach(lm => {
      keypoints.push(lm.x, lm.y, lm.z);
    });
  } else {
    keypoints.push(...Array(63).fill(0));
  }

  // ================= THROTTLE (IMPORTANT) =================
  if (window.flutterReady) {
    SignChannel.postMessage(JSON.stringify(keypoints));
  }
});

// ================= CAMERA =================
const camera = new Camera(video, {
  onFrame: async () => {
    await holistic.send({ image: video });
  },
  width: 640,
  height: 480
});

camera.start();

// 🔥 prevent overload to Flutter
setTimeout(() => {
  window.flutterReady = true;
}, 500);
</script>

</body>
</html>
